apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vaultwarden-data
  namespace: security
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: security
  labels:
    app: vaultwarden
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vaultwarden
  template:
      metadata:
        labels:
          app: vaultwarden
      spec:
        containers:
          - name: vaultwarden
            image: vaultwarden/server
            ports:
              - containerPort: 80
                name: http
            resources:
              requests:
                memory: 256Mi
                cpu: 50m
              limits:
                memory: 1Gi
                cpu: 100m
            livenessProbe:
              httpGet:
                path: /alive
                port: http
              initialDelaySeconds: 15
              periodSeconds: 30
            readinessProbe:
              httpGet:
                path: /alive
                port: http
              initialDelaySeconds: 5
              periodSeconds: 10
            volumeMounts:
              - name: data
                mountPath: /data
        volumes:
          - name: data
            persistentVolumeClaim:
              claimName: vaultwarden-data
---
apiVersion: v1
kind: Service
metadata:
  name: vaultwarden
  namespace: security
spec:
  selector:
    app: vaultwarden
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
