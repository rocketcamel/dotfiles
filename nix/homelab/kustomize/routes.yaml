apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gitlab
  namespace: gitlab
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: kube-system
  hostnames:
    - git.lucalise.ca
  rules:
    - backendRefs:
        - name: gitlab-webservice-default
          port: 8181
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: gitlab-ssh
  namespace: gitlab
spec:
  entryPoints:
    - ssh
  routes:
    - match: HostSNI(`*`)
      services:
        - name: gitlab-gitlab-shell
          port: 22
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: home-assistant
  namespace: home
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: kube-system
  hostnames:
    - home-assistant.lucalise.ca
  rules:
    - backendRefs:
        - name: home-assistant
          port: 8080
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: private-networks
---
