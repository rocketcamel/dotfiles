apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: kube-system
  hostnames:
    - "storage.lucalise.ca"
  rules:
    - backendRefs:
        - name: longhorn-frontend
          port: 80
