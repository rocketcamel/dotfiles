apiVersion: v1
kind: Service
metadata:
  name: bazarr
  namespace: media
spec:
  ports:
    - port: 6767
      targetPort: 6767
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: bazarr
  namespace: media
subsets:
  - addresses:
      - ip: 192.168.20.20
    ports:
      - port: 6767
        protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bazarr
  namespace: media
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: kube-system
  hostnames:
    - "bazarr.lucalise.ca"
  rules:
    - backendRefs:
        - name: bazarr
          port: 6767
---
