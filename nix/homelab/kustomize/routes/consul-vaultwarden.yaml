apiVersion: v1
kind: Namespace
metadata:
  name: vaultwarden
---
apiVersion: v1
kind: Service
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: vaultwarden
  namespace: vaultwarden
subsets:
  - addresses:
      - ip: 192.168.20.22
    ports:
      - port: 8000
        protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: kube-system
  hostnames:
    - "vault.lucalise.ca"
  rules:
    - backendRefs:
        - name: vaultwarden
          port: 8000
