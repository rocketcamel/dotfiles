apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shoko-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shoko
  namespace: media
  labels:
    app: shoko
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shoko
  template:
    metadata:
      labels:
        app: shoko
    spec:
      containers:
        - name: shoko
          image: ghcr.io/shokoanime/server
          ports:
            - containerPort: 8111
              name: http
          env:
            - name: TZ
              value: "America/Vancouver"
          volumeMounts:
            - name: config
              mountPath: /home/shoko/.shoko
            - name: data
              mountPath: /mnt/data
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /api/v3/Init/Status
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v3/Init/Status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: shoko-config
        - name: data
          nfs:
            server: 192.168.27.2
            path: /data
---
apiVersion: v1
kind: Service
metadata:
  name: shoko
  namespace: media
  labels:
    app: shoko
spec:
  selector:
    app: shoko
  ports:
    - port: 8111
      targetPort: http
      protocol: TCP
      name: http
