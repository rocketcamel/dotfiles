      - fabric-api
      - tree-vein-miner
      - lithium
      - servux
      - ferrite-core
      - carpet
      - carpet-tis-addition
      - elytra-trims
      - fabric-language-kotlin
      - c2me-fabric
      - scalablelux
      - axiom
      - pickup-notifications

persistence:
  dataDir:
    enabled: true
    Size: 8Gi
