resources:
  requests:
    cpu: 1
    memory: 500Mi
  limits:
    memory: 6Gi
    cpu: 2500m

minecraftServer:
  eula: "TRUE"
  type: "PAPER"
  version: "1.21.11"
  difficulty: hard
  motd: "A Minecraft Server."
  memory: 6G

persistence:
  dataDir:
    enabled: true
    Size: 4Gi

