persistence:
  size: 8Gi

resources:
  requests:
    cpu: 500m
    memory: 128Mi
  limits:
    cpu: 1
    memory: 512Mi

gitea:
  config:
    repository:
      ROOT: /mnt/git-data/git/repositories
    database:
      DB_TYPE: sqlite3
    session:
      PROVIDER: memory
    cache:
      ADAPTER: memory
    queue:
      TYPE: level
  admin:
    existingSecret: gitea-admin-secret
nodeSelector:
  kubernetes.io/hostname: kube

strategy:
  type: Recreate
      
postgresql:
  enabled: false
postgresql-ha:
  enabled: false
valkey-cluster:
  enabled: false
valkey:
  enabled: false

extraVolumes:
  - name: git-nfs
    nfs:
      server: 192.168.27.2
      path: /data
extraContainerVolumeMounts:
  - name: git-nfs
    mountPath: /mnt/git-data
