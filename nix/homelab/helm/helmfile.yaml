repositories:
  - name: metallb
    url: https://metallb.github.io/metallb
  - name: jellyfin
    url: https://jellyfin.github.io/jellyfin-helm
  - name: minecraft-charts
    url: https://itzg.github.io/minecraft-server-charts
  - name: gitea-charts
    url: https://dl.gitea.com/charts
  - name: longhorn
    url: https://charts.longhorn.io
  - name: home-assistant
    url: https://pajikos.github.io/home-assistant-helm-chart
  - name: pihole
    url: https://mojo2600.github.io/pihole-kubernetes/
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
  - name: gitlab
    url: https://charts.gitlab.io
  - name: nfs-subdir-external-provisioner
    url: https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner

releases:
  # Load Balancer
  - name: metallb
    chart: metallb/metallb
    namespace: metallb-system
    version: 0.15.3

  # Cert Manager
  - name: cert-manager
    chart: oci://quay.io/jetstack/charts/cert-manager
    namespace: cert-manager
    version: 1.19.2
    values:
      - crds:
          enabled: true

  - name: prometheus-stack
    chart: oci://ghcr.io/prometheus-community/charts/kube-prometheus-stack
    namespace: monitoring
    version: 80.9.2
    values:
      - values/prometheus.yaml

  # Git
  - name: gitea
    namespace: git
    chart: gitea-charts/gitea
    version: 12.4.0
    values:
      - values/gitea.yaml

  # - name: gitea-runners
  #   namespace: git
  #   chart: gitea-charts/actions
  #   version: 0.0.2
  #   values:
  #     - values/gitea-runners.yaml

  # GitLab
  - name: gitlab
    namespace: gitlab
    chart: gitlab/gitlab
    version: 9.9.1
    values:
      - values/gitlab.yaml

  # Storage
  - name: longhorn
    namespace: longhorn-system
    chart: longhorn/longhorn
    version: 1.10.1
    values:
      - defaultSettings:
          defaultReplicaCount: 1
      - defaultBackupStore:
          backupTarget: nfs://192.168.27.2:/backup/longhorn
      - persistence:
          defaultClassReplicaCount: 1

  - name: nfs
    namespace: nfs-subdir-system
    chart: nfs-subdir-external-provisioner/nfs-subdir-external-provisioner
    version: 4.0.18
    values:
      - values/nfs.yaml

  - name: pihole
    namespace: pihole-system
    chart: pihole/pihole
    version: 2.35.0
    values:
      - values/pihole.yaml

  # Media
  - name: jellyfin
    namespace: media
    chart: jellyfin/jellyfin
    version: 2.7.0
    values:
      - values/media/jellyfin.yaml

  # Minecraft
  - name: minecraft-router
    namespace: minecraft
    chart: minecraft-charts/mc-router
    version: 1.4.0
    values:
      - values/minecraft/router.yaml

  - name: minecraft-main
    namespace: minecraft
    chart: minecraft-charts/minecraft
    version: 5.0.0
    values:
      - values/minecraft/main.yaml

  - name: minecraft-creative
    namespace: minecraft
    chart: minecraft-charts/minecraft
    version: 5.0.0
    values:
      - values/minecraft/creative.yaml

  - name: minecraft-old
    namespace: minecraft
    chart: minecraft-charts/minecraft
    version: 5.0.0
    values:
      - values/minecraft/old.yaml

  - name: home-assistant
    namespace: home
    chart: home-assistant/home-assistant
    version: 0.3.36
    values:
      - values/home-assistant.yaml

  # Database Services
  - name: postgresql
    namespace: database
    chart: bitnami/postgresql
    version: 18.5.1
    values:
      - values/database/postgresql.yaml

  - name: valkey
    namespace: database
    chart: bitnami/valkey
    version: 5.4.3
    values:
      - values/database/valkey.yaml

  - name: garage
    namespace: database
    chart: charts/garage
    version: 5.4.0
    values:
      - values/database/garage.yaml

